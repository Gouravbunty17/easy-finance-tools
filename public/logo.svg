<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Maple leaf icon -->
  <g transform="translate(0, 4)">
    <!-- Leaf body -->
    <path d="M20 2 L22 8 L28 6 L24 12 L30 14 L24 16 L26 24 L20 20 L14 24 L16 16 L10 14 L16 12 L12 6 L18 8 Z" 
          fill="#003366"/>
    <!-- Stem -->
    <rect x="18.5" y="24" width="3" height="6" rx="1.5" fill="#003366"/>
    <!-- Dollar sign overlay -->
    <text x="20" y="17" text-anchor="middle" font-family="Arial" font-weight="900" font-size="10" fill="white">$</text>
  </g>

  <!-- Chart bars icon -->
  <g transform="translate(36, 6)">
    <rect x="0" y="22" width="5" height="14" rx="2" fill="#00A8E8" opacity="0.6"/>
    <rect x="7" y="14" width="5" height="22" rx="2" fill="#00A8E8" opacity="0.8"/>
    <rect x="14" y="6" width="5" height="30" rx="2" fill="#00A8E8"/>
    <!-- Trend line -->
    <polyline points="2.5,20 9.5,12 16.5,4" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Dot -->
    <circle cx="16.5" cy="4" r="2.5" fill="#FFD700"/>
  </g>

  <!-- Text: Easy -->
  <text x="68" y="30" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#003366">Easy</text>
  <!-- Text: Finance -->
  <text x="108" y="30" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#00A8E8">Finance</text>
  <!-- Text: Tools -->
  <text x="184" y="30" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#003366">Tools</text>

  <!-- Tagline -->
  <text x="68" y="42" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="8" fill="#999" letter-spacing="1">🇨🇦 FREE CANADIAN CALCULATORS</text>
</svg>
